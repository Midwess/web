name: generate-project-docs

on:
  repository_dispatch:
    types: [docs.generate]
  workflow_dispatch:
    inputs:
      project:
        description: "Display name (e.g. Worldant)"
        required: true
        type: string
      slug:
        description: "URL slug (must match src/content/slugs.json)"
        required: true
        type: string
      repo:
        description: "owner/name to clone (e.g. Midwess/worldant)"
        required: true
        type: string
      ref:
        description: "Commit SHA to read"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-${{ github.event.client_payload.slug || inputs.slug }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROJECT: ${{ github.event.client_payload.project || inputs.project }}
      SLUG: ${{ github.event.client_payload.slug || inputs.slug }}
      REPO: ${{ github.event.client_payload.repo || inputs.repo }}
      REF: ${{ github.event.client_payload.ref || inputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate payload
        env:
          SLUG: ${{ env.SLUG }}
        run: |
          if ! echo "$SLUG" | grep -qE '^[a-z0-9][a-z0-9-]{0,40}$'; then
            echo "::error::invalid slug: $SLUG"
            exit 1
          fi
          if ! jq -e --arg s "$SLUG" '.[] | select(. == $s)' src/content/slugs.json >/dev/null; then
            echo "::error::slug $SLUG not in src/content/slugs.json allowlist"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      - name: Clone project source
        env:
          REPO: ${{ env.REPO }}
          REF: ${{ env.REF }}
          PROJECT_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          rm -rf /tmp/project
          TOKEN="${PROJECT_READ_TOKEN:-${{ secrets.GITHUB_TOKEN }}}"
          if [ -z "$TOKEN" ]; then
            echo "::error::no token available for clone"
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${REPO}.git" /tmp/project
          cd /tmp/project
          if [ "$REF" != "HEAD" ]; then
            git fetch --depth 1 origin "$REF"
            git checkout "$REF"
          fi

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.183

      - name: Install midwess/dev-workflow plugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          # Public marketplace repo midwess/dev-workflow. Its
          # .claude-plugin/marketplace.json declares name "midwess-dev" and a
          # plugin "dev-workflow", so the install target is dev-workflow@midwess-dev.
          # `plugin marketplace add` / `install` take no --dangerously-skip-permissions
          # flag (they don't prompt non-interactively).
          claude plugin marketplace add midwess/dev-workflow
          claude plugin install dev-workflow@midwess-dev
          claude plugin list

      - name: Run doc agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_BASE_URL: https://api.minimax.io/anthropic
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'minimax-m3' }}
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
          CI: "1"
          PROJECT_PATH: /tmp/project
        run: |
          PROMPT="$(cat <<EOF
          PROJECT=$PROJECT
          SLUG=$SLUG
          REPO=$REPO
          REF=$REF
          PROJECT_PATH=$PROJECT_PATH

          Follow the contract in the system prompt file: use the /dev-workflow:doc-coauthoring
          skill to (re)generate docs for $SLUG and refresh the single global vision.
          Read ALL of the project source first. Invalidate any out-of-date docs — rewrite or
          delete pages that no longer match the source. Keep src/content/vision.json short
          (one or two sentences) and only change it if this project shifts the overall vision.
          Then run 'pnpm build' until green. Change only files under src/content/docs/$SLUG/
          and src/content/vision.json.
          EOF
          )"
          claude \
            --dangerously-skip-permissions \
            --model "$ANTHROPIC_MODEL" \
            --system-prompt-file .claude/docs-agent.md \
            --add-dir /tmp/project \
            --print \
            "$PROMPT"

      - name: Sanity check diff
        env:
          SLUG: ${{ env.SLUG }}
        run: |
          git add -N .
          # Include deletions (status code ' D') so invalidated pages are caught too.
          git status --porcelain | awk '{print $2}' | sort > /tmp/changed.txt
          cat /tmp/changed.txt
          EXPECTED="src/content/docs/${SLUG}/index.mdx src/content/docs/${SLUG}/meta.json"
          while read -r f; do
            case "$f" in
              src/content/docs/"$SLUG"/*) ;;
              src/content/vision.json) ;;
              dist/*|node_modules/*|.next/*) ;;
              *) echo "::error::agent modified file outside allowlist: $f"; exit 1 ;;
            esac
          done < /tmp/changed.txt
          for e in $EXPECTED; do
            [ -f "$e" ] || { echo "::error::missing required file: $e"; exit 1; }
          done

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLUG: ${{ env.SLUG }}
          REF: ${{ env.REF }}
          PROJECT: ${{ env.PROJECT }}
          REPO: ${{ env.REPO }}
        run: |
          set -euo pipefail
          git config user.name "docs-bot"
          git config user.email "docs-bot@users.noreply.github.com"
          SHORT="${REF::7}"
          BRANCH="docs/${SLUG}-${SHORT}"
          git checkout -B "$BRANCH"
          # -A so deletions of invalidated pages are staged, plus the global vision.
          git add -A "src/content/docs/${SLUG}" src/content/vision.json
          git diff --cached --quiet && { echo "no changes to commit"; exit 0; }
          git commit -m "docs(${SLUG}): regenerate from ${PROJECT}@${SHORT} (+ vision)"
          git push -u origin "$BRANCH" --force-with-lease
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs(${SLUG}): regenerate (${PROJECT}@${SHORT})" \
            --body "Auto-generated docs for \`${SLUG}\` and refreshed global vision from \`${PROJECT}\` (\`${REPO}\`) @ \`${REF}\` via the \`/dev-workflow:doc-coauthoring\` skill (\`repository_dispatch:docs.generate\`)."
